components: []
container:
  event_bindings: {}
  properties:
    html: |-
      <div class="score-wrapper">
        <div class="ring-container">
          <svg viewBox="0 0 36 36" class="circular-chart">
            <path class="circle-bg"
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
              />
            <path class="circle"
              stroke-dasharray="0, 100"
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
              />
            <text x="18" y="20.35" class="percentage">0%</text>
          </svg>
        </div>
        <div class="score-label">User Score</div>
      </div>

      <style>
        .score-wrapper { display: flex; align-items: center; gap: 10px; }
        .ring-container { width: 60px; height: 60px; background: #081c22; border-radius: 50%; padding: 4px; }
        .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 100%; }
        .circle-bg { fill: none; stroke: #204529; stroke-width: 2.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 0.6s ease; }
        .percentage { fill: white; font-family: sans-serif; font-size: 0.55em; text-anchor: middle; font-weight: bold; }
        .score-label { color: white; font-weight: bold; font-family: sans-serif; width: 50px; line-height: 1.1; }
      </style>

      <script>
        function updateScore(score, color, bgColor) {
          const circle = document.querySelector('.circle');
          const text = document.querySelector('.percentage');
          const circleBg = document.querySelector('.circle-bg');

          circle.style.strokeDasharray = `${score}, 100`;
          circle.style.stroke = color;
          circleBg.style.stroke = bgColor;
          text.textContent = score + '%';
        }
      </script>
  type: HtmlTemplate
is_package: true
